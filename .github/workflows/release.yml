name: Release package

on:
  workflow_dispatch:
    inputs:
      package:
        description: Distribution to publish
        required: true
        default: core
        type: choice
        options:
          - core
          - postgres-memory
          - http-json-evidence
      version:
        description: Version declared in pyproject.toml (for example, 0.0.1)
        required: true
        type: string
      target:
        description: Package index to publish to
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.package }}-${{ inputs.target }}-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  verify-and-build:
    name: Verify and build ${{ inputs.package }} ${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.17"
          enable-cache: true

      - name: Install Python
        run: uv python install 3.11

      - name: Select package
        id: package
        shell: bash
        run: |
          case "${{ inputs.package }}" in
            core)
              project_dir="."
              ;;
            postgres-memory)
              project_dir="packages/lumis-sdk-postgres-memory"
              ;;
            http-json-evidence)
              project_dir="packages/lumis-sdk-http-json-evidence"
              ;;
            *)
              echo "Unsupported package selection: ${{ inputs.package }}" >&2
              exit 1
              ;;
          esac
          echo "project-dir=$project_dir" >> "$GITHUB_OUTPUT"

      - name: Check declared version
        run: |
          test "$(uv version --project '${{ steps.package.outputs.project-dir }}' --short)" = "${{ inputs.version }}"

      - name: Sync locked dependencies
        run: uv sync --locked --all-groups

      - name: Verify source
        shell: bash
        run: |
          case "${{ inputs.package }}" in
            core)
              uv run ruff format --check .
              uv run ruff check .
              uv run mypy src
              uv run python scripts/generate_config_schema.py --check
              uv run pytest
              ;;
            postgres-memory)
              PYTHONPATH=packages/lumis-sdk-postgres-memory/src \
                uv run --with 'psycopg[binary]>=3.2,<4' \
                mypy packages/lumis-sdk-postgres-memory/src
              PYTHONPATH=packages/lumis-sdk-postgres-memory/src \
                uv run --with 'psycopg[binary]>=3.2,<4' \
                pytest packages/lumis-sdk-postgres-memory/tests
              ;;
            http-json-evidence)
              PYTHONPATH=packages/lumis-sdk-http-json-evidence/src \
                uv run --with 'httpx>=0.28,<1' \
                mypy packages/lumis-sdk-http-json-evidence/src
              PYTHONPATH=packages/lumis-sdk-http-json-evidence/src \
                uv run --with 'httpx>=0.28,<1' \
                pytest packages/lumis-sdk-http-json-evidence/tests
              PYTHONPATH=packages/lumis-sdk-http-json-evidence/src \
                uv run --with 'httpx>=0.28,<1' \
                python cookbook/webhook-http-evidence/demo.py
              ;;
          esac

      - name: Build publishable distributions
        run: |
          uv build \
            --project "${{ steps.package.outputs.project-dir }}" \
            --no-sources \
            --out-dir "dist/${{ inputs.package }}"

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-dist-${{ inputs.package }}-${{ inputs.version }}
          path: dist/${{ inputs.package }}/
          if-no-files-found: error

  publish-testpypi:
    name: Publish ${{ inputs.package }} ${{ inputs.version }} to TestPyPI
    needs: verify-and-build
    if: inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: python-dist-${{ inputs.package }}-${{ inputs.version }}
          path: dist/

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish ${{ inputs.package }} ${{ inputs.version }} to PyPI
    needs: verify-and-build
    if: inputs.target == 'pypi'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: python-dist-${{ inputs.package }}-${{ inputs.version }}
          path: dist/

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1
