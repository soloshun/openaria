name: Static security analysis

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: "43 6 * * 1"

concurrency:
  group: sast-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bandit:
    name: Bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.17"
          enable-cache: true
      - name: Install Python
        run: uv python install 3.11
      - name: Install locked dependencies
        run: uv sync --frozen --all-groups --python 3.11
      - name: Scan package code
        run: >-
          uv run bandit --recursive --severity-level medium --confidence-level medium
          src packages/lumis-sdk-postgres-memory/src
          packages/lumis-sdk-http-json-evidence/src

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out full history
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Scan committed content and history
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
