version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, github-actions]
    open-pull-requests-limit: 5

  - package-ecosystem: uv
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, python]
    open-pull-requests-limit: 5
