name: Bug report
description: Report a reproducible non-security defect in Lumis SDK.
title: "[Bug] "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: Do not disclose vulnerabilities, credentials, customer data, or private logs here. Follow SECURITY.md for security reports.
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include a small synthetic example, package version, Python version, and operating system.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Adopter impact
      description: Explain the affected workflow, public contract, and any data-integrity or safety implications.
    validations:
      required: true
