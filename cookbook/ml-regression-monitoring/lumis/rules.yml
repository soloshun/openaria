apiVersion: lumis.dev/v1
kind: DiagnosisRuleSet
metadata:
  name: synthetic-ml-regression-rules
spec:
  rules:
    - id: severe-income-feature-drift
      name: severe-income-feature-drift
      version: "1"
      priority: 100
      all_contains:
        - "income z_score=4.2"
        - "threshold=3.0"
      classification: feature_distribution_drift
      severity: medium
      summary: The synthetic income feature distribution moved beyond its configured monitoring threshold.
      root_cause_hypothesis: The incoming population differs materially from the accepted reference distribution.
      confidence: 0.75
      missing_evidence:
        - feature distribution comparison by source segment
        - upstream feature-generation change history
        - validation performance on the shifted population
      recommended_next_steps:
        - Compare current feature statistics with the training reference by source segment.
        - Confirm whether an upstream feature-generation change occurred.
        - Require human review before retraining, threshold changes, or deployment changes.
      suggested_playbook: feature_drift_review
