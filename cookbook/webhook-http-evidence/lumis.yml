apiVersion: lumis.dev/v1
kind: Project
metadata:
  name: webhook-http-evidence
spec:
  evidenceProviders:
    - provider: http-json
      url: https://evidence.example.test/v1/evidence
      allowedOrigins: [https://evidence.example.test]
      tokenEnv: LUMIS_EVIDENCE_TOKEN
      kinds: [schema_diff]
      maxItems: 5
      maxResponseBytes: 50000
      timeoutSeconds: 2
      retries: 0
