[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "lumis-sdk-http-json-evidence"
version = "0.1.1"
description = "Optional generic HTTP JSON evidence-provider plugin for Lumis SDK."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
  "httpx>=0.28,<1",
  "lumis-sdk>=0.0.8,<0.1.0",
]

[project.entry-points."lumis_sdk.plugins"]
http-json-evidence = "lumis_http_json_evidence:create_plugin"

[dependency-groups]
dev = ["pytest>=9,<10"]

[tool.uv.sources]
lumis-sdk = { path = "../..", editable = true }

[tool.hatch.build.targets.wheel]
packages = ["src/lumis_http_json_evidence"]

[tool.hatch.build.targets.wheel.force-include]
"lumis-plugin.json" = "lumis_http_json_evidence/lumis-plugin.json"

[tool.pytest.ini_options]
testpaths = ["tests"]
